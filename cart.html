<!doctype html>
<html lang="pl">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Działający Koszyk</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="shopping-list-container">
    <header class="shopping-list-header">
      <h1>Twoja lista zakupów</h1>
      <span class="item-count">3 produkty</span>
    </header>

    <main class="shopping-list-content">
      <ul class="shopping-list">
        <!-- Elementy koszyka będą ładowane dynamicznie przez script.js -->
      </ul>
    </main>

    <footer class="shopping-list-summary">
      <div class="summary-content">
        <span class="summary-label">Wartość koszyka:</span>
        <span class="summary-total">4 897,00 zł</span>
      </div>
      <button class="checkout-btn">Przejdź do dostawy</button>
    </footer>
  </div>

  <script src="script.js"></script>
</body>

</html>
