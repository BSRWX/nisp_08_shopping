<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Historia Zamówień</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="shopping-list-container">
      <header class="shopping-list-header">
        <h1>Historia zamówień</h1>
        <span class="item-count">3 zamówienia</span>
      </header>

      <main class="shopping-list-content">
        <ul class="shopping-list">
          <!-- Zamówienia będą ładowane dynamicznie przez script.js -->
        </ul>
      </main>

      <footer class="shopping-list-summary">
        <div class="summary-content">
          <span class="summary-label">Wydano łącznie:</span>
          <span class="summary-total">0,00 zł</span>
        </div>
        <button class="checkout-btn secondary" onclick="window.location.href='index.html'">Wróć do sklepu</button>
      </footer>
    </div>
    <script src="script.js"></script>
  </body>
</html>
