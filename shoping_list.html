<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lista Zakupów</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="shopping-list-container">
      <header class="shopping-list-header">
        <h1>Twoja lista zakupów</h1>
        <span class="item-count">2 produkty</span>
      </header>

      <main class="shopping-list-content">
        <ul class="shopping-list">
          <li class="list-item">
            <div class="item-image">
              <div class="img-placeholder">IMG</div>
            </div>
            <div class="item-details">
              <h2 class="item-title">Smartfon XYZ Pro 256GB Czarny</h2>
              <p class="item-availability">W magazynie</p>
            </div>
            <div class="item-actions">
              <div class="quantity-control">
                <button class="qty-btn" aria-label="Zmniejsz ilość">-</button>
                <input
                  type="number"
                  class="qty-input"
                  value="1"
                  min="1"
                  aria-label="Ilość sztuk"
                />
                <button class="qty-btn" aria-label="Zwiększ ilość">+</button>
              </div>
              <div class="item-price">
                <span>4 299,00 zł</span>
              </div>
              <button class="remove-btn" aria-label="Usuń z listy">
                <svg
                  width="20"
                  height="20"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                >
                  <path d="M18 6L6 18M6 6l12 12"></path>
                </svg>
              </button>
            </div>
          </li>

          <li class="list-item">
            <div class="item-image">
              <div class="img-placeholder">IMG</div>
            </div>
            <div class="item-details">
              <h2 class="item-title">Słuchawki bezprzewodowe AudioTech 3.0</h2>
              <p class="item-availability">W magazynie</p>
            </div>
            <div class="item-actions">
              <div class="quantity-control">
                <button class="qty-btn" aria-label="Zmniejsz ilość">-</button>
                <input
                  type="number"
                  class="qty-input"
                  value="2"
                  min="1"
                  aria-label="Ilość sztuk"
                />
                <button class="qty-btn" aria-label="Zwiększ ilość">+</button>
              </div>
              <div class="item-price">
                <span>598,00 zł</span>
              </div>
              <button class="remove-btn" aria-label="Usuń z listy">
                <svg
                  width="20"
                  height="20"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                >
                  <path d="M18 6L6 18M6 6l12 12"></path>
                </svg>
              </button>
            </div>
          </li>
        </ul>
      </main>

      <footer class="shopping-list-summary">
        <div class="summary-content">
          <span class="summary-label">Wartość koszyka:</span>
          <span class="summary-total">4 897,00 zł</span>
        </div>
        <button class="checkout-btn">Przejdź do dostawy</button>
      </footer>
    </div>
  </body>
</html>
