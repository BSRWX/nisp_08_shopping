<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lista Produktów - Kategorie</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="page-container">
      <header class="category-header">
        <div>
          <h1>Elektronika</h1>
          <span class="product-count" id="product-count"
            >Ładowanie produktów...</span
          >
        </div>

        <a href="cart.html" class="cart-link" aria-label="Przejdź do koszyka">
          <svg
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <circle cx="9" cy="21" r="1"></circle>
            <circle cx="20" cy="21" r="1"></circle>
            <path
              d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"
            ></path>
          </svg>
          <span>Koszyk</span>
          <span class="cart-badge" id="cart-counter">0</span>
        </a>
      </header>

      <nav class="category-filters" id="category-filters"></nav>

      <main class="product-grid" id="product-grid"></main>
    </div>

    <script src="script.js"></script>
  </body>
</html>
